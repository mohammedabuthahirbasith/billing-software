spring.application.name=billing


# --- Database connection ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/billing_app}
server.port=${PORT:8080}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT — dev defaults; set strong values via env vars in production
app.jwt.secret=${JWT_SECRET:dev-only-secret-change-in-production-0123456789}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# --- Error responses ---
# Boot 4 renamed these from server.error.* to spring.web.error.* (old keys are deprecated
# and were being forced to ALWAYS by devtools' dev-property defaults, silently leaking stack
# traces). Set explicitly under the current namespace: never leak traces, but surface our own
# business messages and field-level validation errors to API clients.
spring.web.error.include-stacktrace=never
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always