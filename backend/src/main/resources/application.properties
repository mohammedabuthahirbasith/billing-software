spring.application.name=billing


# --- Database connection ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/billing_app}
server.port=${PORT:8080}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT — dev defaults; set strong values via env vars in production
app.jwt.secret=${JWT_SECRET:dev-only-secret-change-in-production-0123456789}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}